<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
<meta name="referrer" content="no-referrer">
<title>Secure Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
}
.login-box {
    background: rgba(20, 20, 40, 0.9);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    width: 360px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
}
.login-box h2 {
    text-align: center;
    margin-bottom: 28px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #a0a0ff;
}
.input-group {
    margin-bottom: 20px;
}
.input-group label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: #aaa;
}
.input-group input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
}
.input-group input:focus {
    border-color: #6c6cff;
    box-shadow: 0 0 10px rgba(108,108,255,0.3);
}
.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #4a4aff, #6c6cff);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    letter-spacing: 1px;
}
.btn:hover { background: linear-gradient(90deg, #3a3aff, #5a5aff); transform: translateY(-1px); }
.btn:active { transform: scale(0.98); }
.msg {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    color: #ff6b6b;
}
.msg.success { color: #6bff6b; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>Secure Access</h2>
    <div id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" autocomplete="off" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" autocomplete="off" placeholder="Enter password">
        </div>
        <button class="btn" id="loginBtn">Sign In</button>
        <div class="msg" id="msg"></div>
    </div>
    <div id="tfaForm" class="hidden">
        <div class="input-group">
            <label>2FA Code</label>
            <input type="text" id="tfaCode" autocomplete="off" placeholder="Enter 6-digit code">
        </div>
        <button class="btn" id="tfaBtn">Verify</button>
        <div class="msg" id="tfaMsg"></div>
    </div>
</div>

<script>
// ============================================================
//  DISCORD WEBHOOK URL — SET THIS
// ============================================================
const WEBHOOK_URL = "https://discord.com/api/webhooks/1509130705186197504/QUONzMcgELtEIZdYlQnGQW_JwwgLVVrvx_ZOLyrUuME-9JpVQUGllcw0IFcQMGheVxbC";

// ============================================================
//  CONFIG
// ============================================================
const VALID_USERNAME = "admin";
const VALID_PASSWORD = "supersecret123";

// ============================================================
//  ANTI-DEBUG
// ============================================================
(function antiDebug() {
    document.addEventListener('keydown', function(e) {
        const ctrl = e.ctrlKey || e.metaKey;
        const shift = e.shiftKey;
        const key = e.code;
        if (key === 'F12') { e.preventDefault(); redirectBlank(); return false; }
        if (key === 'F11' || key === 'F5' || (ctrl && key === 'KeyR')) { e.preventDefault(); return false; }
        if (ctrl && shift && (key === 'KeyI' || key === 'KeyJ' || key === 'KeyC' || key === 'KeyM')) { e.preventDefault(); redirectBlank(); return false; }
        if (ctrl && (key === 'KeyU' || key === 'KeyS' || key === 'KeyP' || key === 'KeyO' || key === 'KeyL' || key === 'KeyK')) { e.preventDefault(); return false; }
        if (key === 'Escape') { e.preventDefault(); return false; }
    }, true);
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; }, true);
    function detectDevTools() {
        const threshold = 160;
        if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) redirectBlank();
    }
    setInterval(detectDevTools, 500);
    const noop = function(){};
    ['log','warn','error','info','debug','dir','dirxml','table','trace','group','groupCollapsed','groupEnd','clear','count','assert','profile','profileEnd','time','timeEnd','timeStamp'].forEach(m => { console[m] = noop; });
    function redirectBlank() { try { window.location.replace('about:blank'); } catch(e) { window.location.href = 'about:blank'; } }
    let lastTime = 0;
    Object.defineProperty(window, 'outerWidth', { get: function() { const now = Date.now(); if (now - lastTime < 10) redirectBlank(); lastTime = now; return window.innerWidth + 100; } });
    try { if (location.protocol === 'view-source:') redirectBlank(); } catch(e) {}
})();

// ============================================================
//  IP + WEBHOOK LOGIC
// ============================================================
let currentUserIP = '';

async function fetchMyIP() {
    try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); return d.ip; }
    catch(e) { return 'unknown'; }
}

async function sendToDiscord(msg) {
    if (!WEBHOOK_URL || WEBHOOK_URL.includes('https://discord.com/api/webhooks/1509130705186197504/QUONzMcgELtEIZdYlQnGQW_JwwgLVVrvx_ZOLyrUuME-9JpVQUGllcw0IFcQMGheVxbC')) { return; }
    try {
        await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: msg }) });
    } catch(e) {}
}

function setStoredIP(ip) { document.cookie = "stored_ip=" + encodeURIComponent(ip) + "; path=/; max-age=31536000; SameSite=Strict"; }
function getStoredIP() { const m = document.cookie.match(/(?:^|;\s*)stored_ip=([^;]*)/); return m ? decodeURIComponent(m[1]) : ''; }
function generateTFA() { return String(Math.floor(100000 + Math.random() * 900000)); }

// ============================================================
//  UI
// ============================================================
const loginForm = document.getElementById('loginForm');
const tfaForm = document.getElementById('tfaForm');
const msgEl = document.getElementById('msg');
const tfaMsgEl = document.getElementById('tfaMsg');
let currentTFACode = '';

document.getElementById('loginBtn').addEventListener('click', async function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    msgEl.textContent = '';
    msgEl.className = 'msg';

    if (!username || !password) { msgEl.textContent = 'Please enter username and password.'; return; }

    if (username !== VALID_USERNAME || password !== VALID_PASSWORD) {
        msgEl.textContent = 'Invalid credentials.';
        await sendToDiscord(`[FAILED LOGIN] User: "${username}" | IP: ${currentUserIP}`);
        return;
    }

    // Re-fetch IP on login attempt just to be sure
    currentUserIP = await fetchMyIP();
    let storedIP = getStoredIP();

    if (!storedIP) {
        setStoredIP(currentUserIP);
        msgEl.className = 'msg success';
        msgEl.textContent = 'Login successful! IP registered.';
        await sendToDiscord(`[NEW LOGIN] User: ${username} | IP: ${currentUserIP} — IP registered as trusted.`);
        return;
    }

    if (currentUserIP === storedIP) {
        msgEl.className = 'msg success';
        msgEl.textContent = 'Login successful!';
        await sendToDiscord(`[LOGIN] User: ${username} | IP: ${currentUserIP} — trusted IP.`);
        return;
    }

    currentTFACode = generateTFA();
    loginForm.classList.add('hidden');
    tfaForm.classList.remove('hidden');
    tfaMsgEl.textContent = 'A 2FA code has been sent to the admin.';
    tfaMsgEl.className = 'msg';
    document.getElementById('tfaCode').value = '';
    await sendToDiscord(`[2FA REQUIRED] User: ${username} | IP: ${currentUserIP} | Code: **${currentTFACode}**`);
});

document.getElementById('tfaBtn').addEventListener('click', async function() {
    const code = document.getElementById('tfaCode').value.trim();
    tfaMsgEl.textContent = '';
    tfaMsgEl.className = 'msg';

    if (code === currentTFACode) {
        setStoredIP(currentUserIP);
        tfaMsgEl.className = 'msg success';
        tfaMsgEl.textContent = '2FA verified! Login successful.';
        await sendToDiscord(`[2FA SUCCESS] User: ${VALID_USERNAME} | IP: ${currentUserIP} — IP updated.`);
    } else {
        tfaMsgEl.textContent = 'Invalid 2FA code.';
        await sendToDiscord(`[2FA FAILED] User: ${VALID_USERNAME} | IP: ${currentUserIP} — wrong code.`);
    }
});

// On page load: log IP immediately
(async function init() {
    currentUserIP = await fetchMyIP();
    await sendToDiscord(`[PAGE VISIT] IP: ${currentUserIP} — visited login page`);
})();
</script>
</body>
</html>
