<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- REMOVED RESTRICTIVE CSP - WAS BLOCKING DISCORD -->
<meta name="referrer" content="no-referrer">
<title>Secure Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
}
.login-box {
    background: rgba(20, 20, 40, 0.9);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    width: 360px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
}
.login-box h2 {
    text-align: center;
    margin-bottom: 28px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #a0a0ff;
}
.input-group {
    margin-bottom: 20px;
}
.input-group label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: #aaa;
}
.input-group input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
}
.input-group input:focus {
    border-color: #6c6cff;
    box-shadow: 0 0 10px rgba(108,108,255,0.3);
}
.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #4a4aff, #6c6cff);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    letter-spacing: 1px;
}
.btn:hover { background: linear-gradient(90deg, #3a3aff, #5a5aff); transform: translateY(-1px); }
.btn:active { transform: scale(0.98); }
.msg {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    color: #ff6b6b;
}
.msg.success { color: #6bff6b; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>Secure Access</h2>
    <div id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" autocomplete="off" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" autocomplete="off" placeholder="Enter password">
        </div>
        <button class="btn" id="loginBtn">Sign In</button>
        <div class="msg" id="msg"></div>
    </div>
    <div id="tfaForm" class="hidden">
        <div class="input-group">
            <label>2FA Code</label>
            <input type="text" id="tfaCode" autocomplete="off" placeholder="Enter 6-digit code">
        </div>
        <button class="btn" id="tfaBtn">Verify</button>
        <div class="msg" id="tfaMsg"></div>
    </div>
</div>

<script>
// ============================================================
//  DISCORD WEBHOOK URL — REPLACE WITH YOUR ACTUAL WEBHOOK
// ============================================================
const WEBHOOK_URL = "https://discord.com/api/webhooks/1509130705186197504/QUONzMcgELtEIZdYlQnGQW_JwwgLVVrvx_ZOLyrUuME-9JpVQUGllcw0IFcQMGheVxbC";

// ============================================================
//  CONFIGURATION
// ============================================================
const VALID_USERNAME = "admin";
const VALID_PASSWORD = "supersecret123";

// ============================================================
//  IMPROVED ANTI-DEBUG (LIGHTER VERSION THAT DOESN'T BREAK WEBHOOKS)
// ============================================================
(function antiDebug() {
    // Block F12 and Ctrl+Shift+I only
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
            return false;
        }
    });
    
    // Block right-click
    document.addEventListener('contextmenu', function(e) { 
        e.preventDefault(); 
        return false; 
    });
})();

// ============================================================
//  FIXED IP FETCH + WEBHOOK LOGIC
// ============================================================
let currentUserIP = '';
let storedIP = '';

// Fetch user's IP with fallback
async function fetchMyIP() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
    } catch(e) {
        console.error('IP fetch failed:', e);
        return 'unknown';
    }
}

// FIXED: Proper Discord webhook sender
async function sendToDiscord(message) {
    // Check if webhook URL is configured properly
    if (!WEBHOOK_URL || WEBHOOK_URL === "https://discord.com/api/webhooks/1509130705186197504/QUONzMcgELtEIZdYlQnGQW_JwwgLVVrvx_ZOLyrUuME-9JpVQUGllcw0IFcQMGheVxbC") {
        console.warn('⚠️ Webhook not configured! Set WEBHOOK_URL variable.');
        console.log('Would have sent:', message);
        return false;
    }
    
    try {
        const payload = {
            content: message,
            username: "Login Monitor",
            embeds: [{
                title: "Login Activity",
                description: message,
                color: 0xff0000,
                timestamp: new Date().toISOString()
            }]
        };
        
        const response = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        
        if (response.ok) {
            console.log('✅ Webhook sent successfully');
            return true;
        } else {
            console.error('❌ Webhook failed with status:', response.status);
            const errorText = await response.text();
            console.error('Error details:', errorText);
            return false;
        }
    } catch(e) {
        console.error('❌ Webhook error:', e.message);
        return false;
    }
}

// Generate random 6-digit 2FA code
function generateTFA() {
    return String(Math.floor(100000 + Math.random() * 900000));
}

// Cookie storage functions
function setStoredIP(ip) {
    document.cookie = "stored_ip=" + encodeURIComponent(ip) + "; path=/; max-age=31536000; SameSite=Strict";
}

function getStoredIP() {
    const match = document.cookie.match(/(?:^|;\s*)stored_ip=([^;]*)/);
    return match ? decodeURIComponent(match[1]) : '';
}

// ============================================================
//  UI LOGIC
// ============================================================
const loginForm = document.getElementById('loginForm');
const tfaForm = document.getElementById('tfaForm');
const msgEl = document.getElementById('msg');
const tfaMsgEl = document.getElementById('tfaMsg');
let currentTFACode = '';

document.getElementById('loginBtn').addEventListener('click', async function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    msgEl.textContent = '';
    msgEl.className = 'msg';

    if (!username || !password) {
        msgEl.textContent = 'Please enter username and password.';
        return;
    }

    if (username !== VALID_USERNAME || password !== VALID_PASSWORD) {
        msgEl.textContent = 'Invalid credentials.';
        await sendToDiscord(`[FAILED LOGIN] User: "${username}" | IP: ${currentUserIP}`);
        return;
    }

    // Credentials valid — get IP
    currentUserIP = await fetchMyIP();
    storedIP = getStoredIP();

    if (!storedIP) {
        // First-time login — store this IP
        setStoredIP(currentUserIP);
        msgEl.className = 'msg success';
        msgEl.textContent = 'Login successful! IP registered.';
        await sendToDiscord(`[NEW LOGIN] User: ${username} | IP: ${currentUserIP} — IP registered as trusted.`);
        return;
    }

    // IP matches stored IP?
    if (currentUserIP === storedIP) {
        msgEl.className = 'msg success';
        msgEl.textContent = 'Login successful!';
        await sendToDiscord(`[LOGIN] User: ${username} | IP: ${currentUserIP} — trusted IP.`);
        return;
    }

    // Different IP — require 2FA
    currentTFACode = generateTFA();
    loginForm.classList.add('hidden');
    tfaForm.classList.remove('hidden');
    tfaMsgEl.textContent = 'A 2FA code has been sent to the admin.';
    tfaMsgEl.className = 'msg';
    document.getElementById('tfaCode').value = '';

    await sendToDiscord(`[2FA REQUIRED] User: ${username} | IP: ${currentUserIP} | Code: **${currentTFACode}**`);
});

document.getElementById('tfaBtn').addEventListener('click', async function() {
    const code = document.getElementById('tfaCode').value.trim();
    tfaMsgEl.textContent = '';
    tfaMsgEl.className = 'msg';

    if (code === currentTFACode) {
        // 2FA success — update stored IP to new IP
        setStoredIP(currentUserIP);
        tfaMsgEl.className = 'msg success';
        tfaMsgEl.textContent = '2FA verified! Login successful.';
        await sendToDiscord(`[2FA SUCCESS] User: ${VALID_USERNAME} | IP: ${currentUserIP} — IP updated to new trusted IP.`);
    } else {
        tfaMsgEl.textContent = 'Invalid 2FA code.';
        await sendToDiscord(`[2FA FAILED] User: ${VALID_USERNAME} | IP: ${currentUserIP} — wrong code entered.`);
    }
});

// Initialize
(async function init() {
    currentUserIP = await fetchMyIP();
    console.log('Current IP:', currentUserIP);
})();
</script>
</body>
</html>
