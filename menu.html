<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       rgba(0,0,0,0.95);
    --header:   rgba(0,0,0,1);
    --item:     rgba(0,0,0,0.65);
    --item-h:   rgba(18,18,18,0.75);
    --accent:   #8c0000;
    --accent2:  #c0392b;
    --tab-act:  rgba(140,0,0,1);
    --text:     #f0f0f0;
    --text2:    #888;
    --sep:      rgba(80,80,80,0.6);
    --scroll-bg: rgba(20,20,20,0.7);
    --footer:   rgba(0,0,0,1);
    --banner-h: 88px;
    --item-h2:  36px;
    --font:     'Rajdhani', sans-serif;
    --mono:     'Share Tech Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: var(--font);
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
  }

  /* ── MENU WRAPPER ── */
  #menu-root {
    position: fixed;
    left: 70px; top: 100px;
    width: 360px;
    display: none;
    flex-direction: column;
    user-select: none;
    border-radius: 0 0 9px 9px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
  }
  #menu-root.visible { display: flex; }

  /* ── BANNER ── */
  #banner {
    height: var(--banner-h);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    background: #0a0a12;
  }
  #banner-img {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity .4s;
  }
  #banner-img.loaded { opacity: 1; }
  #banner-fallback {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(180deg, #121228 0%, #060610 100%);
  }
  #banner-fallback .title {
    font-size: 26px; font-weight: 700; letter-spacing: 4px;
    color: var(--accent2); text-transform: uppercase;
  }
  #banner-fallback .subtitle {
    font-size: 13px; color: var(--text2); letter-spacing: 2px; margin-top: 4px;
  }
  /* red gradient overlay at bottom of banner */
  #banner::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 20px;
    background: linear-gradient(to bottom, transparent, var(--bg));
    pointer-events: none;
  }

  /* ── HEADER ── */
  #cat-header {
    height: 35px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #0d0d0d 0%, #000 100%);
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  #cat-title {
    font-size: 15px; font-weight: 700; letter-spacing: 3px;
    color: var(--text); text-transform: uppercase;
  }

  /* ── TABS ── */
  #tabs-bar {
    display: none;
    height: 32px;
    flex-shrink: 0;
  }
  #tabs-bar.visible { display: flex; }
  .tab-btn {
    flex: 1; height: 100%; border: none; cursor: pointer;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text2);
    background: linear-gradient(180deg, #080808 0%, #030303 100%);
    transition: color .15s, background .15s;
    border-right: 1px solid rgba(255,255,255,0.03);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    color: var(--text);
    background: linear-gradient(180deg, var(--accent) 0%, rgba(100,0,0,0.7) 100%);
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.05); }

  /* ── ITEMS LIST ── */
  #items-list {
    flex: 1;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }
  .menu-item {
    height: var(--item-h2);
    display: flex; align-items: center;
    padding: 0 14px;
    cursor: pointer;
    position: relative;
    background: var(--item);
    transition: background .08s;
  }
  .menu-item:not(.separator):hover { background: var(--item-h); }
  .menu-item.selected {
    background: linear-gradient(180deg, var(--accent) 0%, rgba(100,0,0,0.7) 100%);
  }

  /* separator */
  .menu-item.separator {
    cursor: default;
    background: transparent;
  }
  .sep-line {
    position: absolute; left: 0; right: 0; top: 50%;
    display: flex; align-items: center; padding: 0 14px;
  }
  .sep-bar { flex: 1; height: 1.5px; background: rgba(255,255,255,0.18); }
  .sep-text {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55);
    letter-spacing: 2px; text-transform: uppercase;
    padding: 0 8px;
  }

  /* item label */
  .item-label {
    font-size: 15px; font-weight: 600; color: var(--text);
    letter-spacing: 0.5px; flex: 1;
    text-shadow: 0.3px 0.3px 0 rgba(255,255,255,0.3);
  }

  /* chevron for sub-categories */
  .item-arrow {
    font-size: 15px; color: var(--text); opacity: 0.8; margin-left: 6px;
  }

  /* toggle */
  .item-toggle {
    width: 32px; height: 16px; border-radius: 8px;
    position: relative; flex-shrink: 0; margin-left: 8px;
    transition: background .2s;
    background: rgba(50,50,50,0.7);
  }
  .item-toggle.on { background: var(--accent2); }
  .item-toggle-thumb {
    position: absolute; top: 2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff;
    transition: left .2s;
    left: 2px;
  }
  .item-toggle.on .item-toggle-thumb { left: 18px; }

  /* selector */
  .item-selector {
    font-size: 13px; color: var(--text2); margin-left: 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .item-selector span { color: var(--text); font-weight: 600; }
  .sel-arrow { font-size: 11px; opacity: 0.6; }

  /* player item */
  .item-player-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2); margin-right: 8px; flex-shrink: 0;
  }

  /* ── SCROLLBAR ── */
  #scrollbar {
    position: absolute; right: -14px; top: 0; bottom: 0; width: 8px;
  }
  #scrollbar-track {
    position: absolute; inset: 0;
    background: var(--scroll-bg);
    border-radius: 4px;
  }
  #scrollbar-thumb {
    position: absolute; left: 1px; right: 1px;
    border-radius: 3px;
    background: linear-gradient(180deg, var(--accent2) 0%, rgba(120,0,0,0.7) 100%);
    transition: top .1s, height .1s;
  }

  /* ── FOOTER ── */
  #footer {
    height: 24px;
    display: flex; align-items: center;
    padding: 0 14px;
    background: var(--footer);
    border-top: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
    border-radius: 0 0 9px 9px;
  }
  #footer-left {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text2);
    font-family: var(--mono);
  }
  #footer-divider { color: rgba(255,255,255,0.2); }
  #footer-right {
    margin-left: auto;
    font-size: 12px; color: var(--text2);
    font-family: var(--mono);
  }

  /* ── FREECAM OVERLAY ── */
  #freecam-root {
    position: fixed;
    left: 0; right: 0; bottom: 70px;
    display: none;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  #freecam-root.visible { display: flex; }

  /* crosshair */
  #crosshair {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .ch-h, .ch-v {
    position: absolute;
    background: rgba(255,255,255,0.9);
  }
  .ch-h { width: 18px; height: 1.5px; top: 50%; transform: translateY(-50%); }
  .ch-h.left  { right: calc(50% + 5px); }
  .ch-h.right { left:  calc(50% + 5px); }
  .ch-v { height: 18px; width: 1.5px; left: 50%; transform: translateX(-50%); }
  .ch-v.top    { bottom: calc(50% + 5px); }
  .ch-v.bottom { top:    calc(50% + 5px); }
  .ch-dot {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent2);
  }

  /* mode pills */
  #fc-modes {
    display: flex; gap: 6px;
    margin-bottom: 8px;
  }
  .fc-mode-pill {
    padding: 6px 14px;
    border-radius: 3px;
    font-family: var(--font);
    font-size: 13px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    background: rgba(8,8,8,0.75);
    color: var(--text2);
  }
  .fc-mode-pill.active {
    background: var(--accent2);
    color: #fff;
  }

  /* options list */
  #fc-options {
    display: flex; flex-direction: column;
    align-items: center; gap: 0;
    background: rgba(0,0,0,0.88);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
    min-width: 200px;
    max-height: 340px;
    overflow-y: auto;
  }
  #fc-options::-webkit-scrollbar { display: none; }
  .fc-option {
    width: 100%; padding: 8px 16px;
    font-size: 14px; font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    text-align: left;
    transition: background .1s, color .1s;
  }
  .fc-option:last-child { border-bottom: none; }
  .fc-option.fc-selected {
    background: linear-gradient(90deg, var(--accent) 0%, rgba(100,0,0,0.4) 100%);
    color: #fff;
  }

  #fc-hint {
    margin-top: 6px;
    font-size: 11px; color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    font-family: var(--mono);
  }

  /* ── NOTIFICATION SYSTEM ── */
  #notif-root {
    position: fixed;
    right: 18px; bottom: 18px;
    display: flex; flex-direction: column-reverse;
    gap: 10px;
    pointer-events: none;
    z-index: 999;
  }
  .notif {
    width: 320px; height: 52px;
    position: relative; overflow: hidden;
    display: flex; align-items: stretch;
    background: rgba(18,18,23,0.96);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
    animation: notif-in .22s cubic-bezier(0.22,1,0.36,1) both;
  }
  .notif.out { animation: notif-out .3s ease forwards; }
  @keyframes notif-in {
    from { transform: translateX(360px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }
  @keyframes notif-out {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(360px); }
  }
  .notif-accent { width: 4px; flex-shrink: 0; }
  .notif-icon-wrap {
    width: 38px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .notif-icon {
    width: 22px; height: 22px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .notif-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-right: 10px; }
  .notif-type { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .notif-msg  { font-size: 13px; color: rgba(235,235,240,1); margin-top: 1px; }
  .notif-bar  { position: absolute; bottom: 0; left: 4px; height: 2px; transition: width linear; }
  .notif-top-line { position: absolute; top: 0; left: 4px; right: 0; height: 1px; background: rgba(255,255,255,0.06); }
</style>
</head>

  Kaneki: { banner: "https://i.imgur.com/ygt0Agc.gif",    color: [0.55, 0.0, 0.0]  },
  Gojo:   { banner: "https://i.imgur.com/bJR2OEx.png",    color: [0.55, 0.25, 0.7] },
  Kirua:  { banner: "https://i.imgur.com/mse4B9d.jpeg",   color: [0.2, 0.35, 0.65] },
  Zoro:   { banner: "https://i.imgur.com/3tb3Y8w.jpeg",   color: [0.15, 0.5, 0.2]  },
  Vegeto: { banner: "https://i.imgur.com/s9sU4z6.jpeg",   color: [0.65, 0.6, 0.0]  },
  Sukuna: { banner: "https://i.imgur.com/8ph602j.jpeg",   color: [0.7, 0.35, 0.0]  },
};
let currentTheme = 'Kaneki';

function applyTheme(name) {
  const t = THEMES[name] || THEMES.Kaneki;
  currentTheme = name;
  const [r,g,b] = t.color;
  const css  = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
  const css2 = `rgba(${Math.round(r*255*1.3)},${Math.round(g*255*1.3)},${Math.round(b*255*1.3)},1)`;
  document.documentElement.style.setProperty('--accent',  css);
  document.documentElement.style.setProperty('--accent2', css2);
  document.documentElement.style.setProperty('--tab-act', css);
  const img = document.getElementById('banner-img');
  img.classList.remove('loaded');
  img.src = t.banner;
}
applyTheme('Kaneki');

// ─── STATE ────────────────────────────────────────────────────────────────
const MAX_VISIBLE = 8;
let menuOpen = false;
let freecamOpen = false;

let state = {
  category: 'main',
  selectedIndex: 0,
  currentTab: 0,
  history: [],
  toggles: {},
  selectorIdxs: {},
  sliderVals: {},
};

// ─── HELPERS ─────────────────────────────────────────────────────────────
function getCategory() {
  return CATEGORIES[state.category] || CATEGORIES.main;
}
function getItems() {
  const cat = getCategory();
  if (cat.hasTabs) {
    return cat.tabs[state.currentTab]?.items || [];
  }
  return cat.items || [];
}
function isSep(item) { return !!item.isSep; }
function countNonSep(items) { return items.filter(i => !isSep(i)).length; }
function jumpOverSep(items, idx, dir) {
  let tries = items.length;
  while (tries-- > 0 && isSep(items[idx])) {
    idx = (idx + dir + items.length) % items.length;
  }
  return idx;
}

// ─── RENDER ──────────────────────────────────────────────────────────────
function render() {
  const cat = getCategory();
  const items = getItems();

  // title
  document.getElementById('cat-title').textContent = cat.title.toUpperCase();

  // tabs
  const tabsBar = document.getElementById('tabs-bar');
  tabsBar.innerHTML = '';
  if (cat.hasTabs) {
    tabsBar.classList.add('visible');
    cat.tabs.forEach((tab, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === state.currentTab ? ' active' : '');
      btn.textContent = tab.name;
      btn.onclick = () => { state.currentTab = i; state.selectedIndex = jumpOverSep(getItems(), 0, 1); render(); };
      tabsBar.appendChild(btn);
    });
  } else {
    tabsBar.classList.remove('visible');
  }

  // items
  const list = document.getElementById('items-list');
  list.innerHTML = '';

  const visStart = Math.max(0, Math.min(
    state.selectedIndex - Math.floor(MAX_VISIBLE / 2),
    items.length - MAX_VISIBLE
  ));
  const visEnd = Math.min(visStart + MAX_VISIBLE, items.length);

  for (let i = visStart; i < visEnd; i++) {
    const item = items[i];
    const el = document.createElement('div');
    el.className = 'menu-item' + (i === state.selectedIndex ? ' selected' : '') + (isSep(item) ? ' separator' : '');

    if (isSep(item)) {
      const line = document.createElement('div');
      line.className = 'sep-line';
      line.innerHTML = `<div class="sep-bar"></div><div class="sep-text">${item.sepText}</div><div class="sep-bar"></div>`;
      el.appendChild(line);
    } else {
      // label
      const lbl = document.createElement('span');
      lbl.className = 'item-label';
      lbl.textContent = item.label;
      el.appendChild(lbl);

      // right side
      if (item.action === 'category') {
        const arr = document.createElement('span');
        arr.className = 'item-arrow';
        arr.textContent = '>';
        el.appendChild(arr);
      } else if (item.action === 'toggle') {
        const tog = document.createElement('div');
        const on = !!state.toggles[item.key];
        tog.className = 'item-toggle' + (on ? ' on' : '');
        tog.innerHTML = `<div class="item-toggle-thumb"></div>`;
        el.appendChild(tog);
      } else if (item.action === 'selector') {
        const key = `${state.category}_${state.currentTab}_${i}`;
        if (state.selectorIdxs[key] === undefined) state.selectorIdxs[key] = item.idx || 0;
        const idx = state.selectorIdxs[key];
        const val = item.options[idx] || '';
        const sel = document.createElement('div');
        sel.className = 'item-selector';
        sel.innerHTML = `<span class="sel-arrow">◄</span><span>${val}</span><span class="sel-arrow">►</span>`;
        el.appendChild(sel);
      } else if (item.action === 'slider') {
        const key = `slider_${item.key}`;
        if (state.sliderVals[key] === undefined) state.sliderVals[key] = item.val ?? 100;
        const v = state.sliderVals[key];
        const pct = ((v - item.min) / (item.max - item.min)) * 100;
        const sliderWrap = document.createElement('div');
        sliderWrap.style.cssText = 'display:flex;align-items:center;gap:6px;margin-left:8px;';
        sliderWrap.innerHTML = `
          <div style="width:85px;height:6px;background:rgba(20,20,20,0.7);border-radius:3px;position:relative;">
            <div style="position:absolute;left:0;top:0;height:6px;width:${pct}%;background:var(--accent2);border-radius:3px;"></div>
            <div style="position:absolute;top:50%;transform:translate(-50%,-50%);left:${pct}%;width:10px;height:10px;background:#fff;border-radius:50%;"></div>
          </div>
          <span style="font-size:11px;color:var(--text2);font-family:var(--mono);">${Math.round(v)}</span>
        `;
        el.appendChild(sliderWrap);
      }
    }
    list.appendChild(el);
  }

  // scrollbar
  const sb = document.getElementById('scrollbar');
  if (items.length > MAX_VISIBLE) {
    sb.style.display = 'block';
    const pct = state.selectedIndex / (items.length - 1);
    const trackH = MAX_VISIBLE * 36;
    const thumbH = Math.max(20, trackH / items.length);
    const thumbTop = pct * (trackH - thumbH);
    const thumb = document.getElementById('scrollbar-thumb');
    thumb.style.top = thumbTop + 'px';
    thumb.style.height = thumbH + 'px';
  } else {
    sb.style.display = 'none';
  }

  // footer pos
  document.getElementById('footer-right').textContent =
    `${state.selectedIndex + 1}/${items.length}`;

  // list height
  list.style.height = (Math.min(items.length, MAX_VISIBLE) * 36) + 'px';
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────
function navUp() {
  const items = getItems();
  state.selectedIndex = jumpOverSep(items, (state.selectedIndex - 1 + items.length) % items.length, -1);
  render();
}
function navDown() {
  const items = getItems();
  state.selectedIndex = jumpOverSep(items, (state.selectedIndex + 1) % items.length, 1);
  render();
}
function navLeft() {
  const items = getItems();
  const item = items[state.selectedIndex];
  if (!item) return;
  const cat = getCategory();
  if (cat.hasTabs && state.currentTab > 0) {
    state.currentTab--;
    state.selectedIndex = jumpOverSep(getItems(), 0, 1);
    render(); return;
  }
  if (item.action === 'selector') {
    const key = `${state.category}_${state.currentTab}_${state.selectedIndex}`;
    if (state.selectorIdxs[key] === undefined) state.selectorIdxs[key] = 0;
    state.selectorIdxs[key] = (state.selectorIdxs[key] - 1 + item.options.length) % item.options.length;
    render();
  } else if (item.action === 'slider') {
    const key = `slider_${item.key}`;
    state.sliderVals[key] = Math.max(item.min, (state.sliderVals[key] || item.val) - 1);
    render();
  }
}
function navRight() {
  const items = getItems();
  const item = items[state.selectedIndex];
  if (!item) return;
  const cat = getCategory();
  if (cat.hasTabs && state.currentTab < cat.tabs.length - 1) {
    state.currentTab++;
    state.selectedIndex = jumpOverSep(getItems(), 0, 1);
    render(); return;
  }
  if (item.action === 'selector') {
    const key = `${state.category}_${state.currentTab}_${state.selectedIndex}`;
    if (state.selectorIdxs[key] === undefined) state.selectorIdxs[key] = 0;
    state.selectorIdxs[key] = (state.selectorIdxs[key] + 1) % item.options.length;
    // theme change
    if (item.label === 'Menu Theme') {
      applyTheme(item.options[state.selectorIdxs[key]]);
    }
    render();
  } else if (item.action === 'slider') {
    const key = `slider_${item.key}`;
    state.sliderVals[key] = Math.min(item.max, (state.sliderVals[key] || item.val) + 1);
    render();
  }
}
function navSelect() {
  const items = getItems();
  const item = items[state.selectedIndex];
  if (!item || isSep(item)) return;

  if (item.action === 'category' && item.target) {
    if (CATEGORIES[item.target]) {
      state.history.push({ category: state.category, tab: state.currentTab, idx: state.selectedIndex });
      state.category = item.target;
      state.currentTab = 0;
      state.selectedIndex = jumpOverSep(getItems(), 0, 1);
      render();
    }
  } else if (item.action === 'toggle') {
    state.toggles[item.key] = !state.toggles[item.key];
    // freecam special
    if (item.key === 'freecam') {
      if (state.toggles.freecam) openFreecam(); else closeFreecam();
    }
    render();
    showNotif(item.label, state.toggles[item.key] ? 'Enabled' : 'Disabled', state.toggles[item.key] ? 'success' : 'info');
  } else if (item.action === 'button') {
    showNotif(item.label, item.label + ' executed.', 'success');
  }
}
function navBack() {
  if (state.history.length > 0) {
    const prev = state.history.pop();
    state.category = prev.category;
    state.currentTab = prev.tab;
    state.selectedIndex = prev.idx;
    render();
  } else if (state.category !== 'main') {
    state.category = 'main';
    state.currentTab = 0;
    state.selectedIndex = 0;
    render();
  } else {
    closeMenu();
  }
}

// ─── MENU OPEN/CLOSE ─────────────────────────────────────────────────────
function openMenu() {
  menuOpen = true;
  document.getElementById('menu-root').classList.add('visible');
  state.category = 'main';
  state.currentTab = 0;
  state.selectedIndex = 0;
  state.history = [];
  render();
}
function closeMenu() {
  menuOpen = false;
  document.getElementById('menu-root').classList.remove('visible');
}

// ─── FREECAM ─────────────────────────────────────────────────────────────
const FC_OPTIONS = [
  'Default','Teleport','Shoot Weapon','Shoot Vehicle','Copy Appearance',
  'Kick from Vehicle','Hijack Vehicle','Delete Vehicle','Detach Wheels',
  'Black Hole','RC Vehicle','Unlock Doors','Attach Car To Player',
];
let fcMode = 0;    // 0=teleport, 1=warpvehicle
let fcOption = 0;  // index into FC_OPTIONS

function renderFreecam() {
  const fc = document.getElementById('fc-options');
  fc.innerHTML = '';
  FC_OPTIONS.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'fc-option' + (i === fcOption ? ' fc-selected' : '');
    el.textContent = opt;
    fc.appendChild(el);
  });
  // scroll selected into view
  const selected = fc.querySelector('.fc-selected');
  if (selected) selected.scrollIntoView({ block: 'nearest' });

  document.getElementById('fc-pill-tp').className   = 'fc-mode-pill' + (fcMode === 0 ? ' active' : '');
  document.getElementById('fc-pill-veh').className  = 'fc-mode-pill' + (fcMode === 1 ? ' active' : '');
}
function openFreecam() {
  freecamOpen = true;
  document.getElementById('freecam-root').classList.add('visible');
  renderFreecam();
}
function closeFreecam() {
  freecamOpen = false;
  document.getElementById('freecam-root').classList.remove('visible');
  // sync toggle state
  state.toggles['freecam'] = false;
  if (menuOpen) render();
}

// ─── NOTIFICATIONS ───────────────────────────────────────────────────────
const NOTIF_TYPES = {
  success: { r:0.18,g:0.85,b:0.47, label:'SUCCESS', icon:'✓' },
  warning: { r:0.99,g:0.76,b:0.14, label:'WARNING', icon:'!' },
  error:   { r:0.95,g:0.25,b:0.25, label:'ERROR',   icon:'✕' },
  info:    { r:0.25,g:0.65,b:0.99, label:'INFO',    icon:'i' },
};
function showNotif(title, msg, type='info') {
  const cfg = NOTIF_TYPES[type] || NOTIF_TYPES.info;
  const r = Math.round(cfg.r*255), g = Math.round(cfg.g*255), b = Math.round(cfg.b*255);
  const color = `rgb(${r},${g},${b})`;
  const root = document.getElementById('notif-root');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `
    <div class="notif-top-line"></div>
    <div class="notif-accent" style="background:${color};"></div>
    <div class="notif-icon-wrap">
      <div class="notif-icon" style="background:rgba(${r},${g},${b},0.18);border:1px solid rgba(${r},${g},${b},0.45);color:${color};">${cfg.icon}</div>
    </div>
    <div class="notif-body">
      <div class="notif-type" style="color:${color};">${cfg.label}</div>
      <div class="notif-msg">${msg}</div>
    </div>
    <div class="notif-bar" style="background:${color};width:100%;"></div>
  `;
  root.appendChild(el);

  // progress bar
  const bar = el.querySelector('.notif-bar');
  const HOLD = 3200;
  bar.style.transition = `width ${HOLD}ms linear`;
  requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = '0%'; }));

  // remove
  const remove = () => {
    el.classList.add('out');
    el.addEventListener('animationend', () => el.remove());
  };
  setTimeout(remove, HOLD + 220);
}

// ─── MESSAGE LISTENER (from Lua SendDuiMessage / SendNUIMessage) ──────────
window.addEventListener('message', (e) => {
  const data = e.data;
  if (!data || !data.action) return;

  switch (data.action) {
    case 'open':
      openMenu();
      break;
    case 'close':
      closeMenu();
      break;
    case 'move':
      if (data.dir === 'up')    navUp();
      if (data.dir === 'down')  navDown();
      if (data.dir === 'left')  navLeft();
      if (data.dir === 'right') navRight();
      break;
    case 'select':
      navSelect();
      break;
    case 'back':
      navBack();
      break;
    case 'displayFreecam':
      if (data.visible) openFreecam();
      else closeFreecam();
      break;
    case 'scroll':
      if (freecamOpen) {
        if (data.direction === 'up')   { fcOption = (fcOption - 1 + FC_OPTIONS.length) % FC_OPTIONS.length; renderFreecam(); }
        if (data.direction === 'down') { fcOption = (fcOption + 1) % FC_OPTIONS.length; renderFreecam(); }
      }
      break;
    case 'fcMode':
      fcMode = data.mode; renderFreecam();
      break;
    case 'notify':
      showNotif(data.title, data.msg, data.type);
      break;
    case 'setTheme':
      applyTheme(data.theme);
      break;
  }
});

// ─── KEYBOARD (for browser testing) ─────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' || e.key === 'Del') {
    menuOpen ? closeMenu() : openMenu();
  }
  if (!menuOpen && !freecamOpen) return;
  if (menuOpen) {
    if (e.key === 'ArrowUp')    { e.preventDefault(); navUp(); }
    if (e.key === 'ArrowDown')  { e.preventDefault(); navDown(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); navLeft(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); navRight(); }
    if (e.key === 'Enter')      { e.preventDefault(); navSelect(); }
    if (e.key === 'Backspace')  { e.preventDefault(); navBack(); }
    if (e.key === 'F5')         { e.preventDefault(); freecamOpen ? closeFreecam() : openFreecam(); }
  }
  if (freecamOpen) {
    if (e.key === 'ArrowUp')   { fcOption = (fcOption - 1 + FC_OPTIONS.length) % FC_OPTIONS.length; renderFreecam(); }
    if (e.key === 'ArrowDown') { fcOption = (fcOption + 1) % FC_OPTIONS.length; renderFreecam(); }
    if (e.key === 'Enter')     {
      showNotif('Freecam', 'Activated: ' + FC_OPTIONS[fcOption], 'success');
      closeFreecam();
    }
    if (e.key === 'F5')        { closeFreecam(); }
  }
});
